openapi: 3.0.3
info:
  title: Real Estate Data API
  description: >
    Read-only API for Swedish real estate market data sourced from Booli.
    Covers completed sales transactions and property advertisements.
  version: 0.1.0
  contact:
    url: https://github.com/asapozhkov

servers:
  - url: https://wqyh106uo0.execute-api.eu-north-1.amazonaws.com
    description: Production

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /sales/stats/avg-price-per-sqm:
    get:
      summary: Average sale price per square metre
      operationId: getSalesStatsAvgPricePerSqm
      description: >
        Returns the average final sale price per square metre (kr/m²) across
        completed sales in the database. Both query parameters are optional and
        can be combined. The response always includes the date range and number
        of sales that contributed to the average so the caller can judge
        statistical significance.
      parameters:
        - name: year
          in: query
          required: false
          description: Restrict to sales in this calendar year.
          schema:
            type: integer
            minimum: 1900
            maximum: 2100
          example: 2025
        - name: rooms
          in: query
          required: false
          description: >
            Restrict to sales where the number of rooms matches exactly.
            Accepts integers and half-values (e.g. 3 or 3.5).
          schema:
            type: number
            minimum: 0.5
            maximum: 20
          example: 3
      responses:
        "200":
          description: Average successfully computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvgPricePerSqm"
              examples:
                all_data:
                  summary: No filters — all 375 sales
                  value:
                    avg_kr_per_m2: 29112
                    sample_count: 375
                    from_date: "2012-11-02"
                    to_date: "2026-06-03"
                    filters:
                      year: null
                      rooms: null
                by_year:
                  summary: Filter by year
                  value:
                    avg_kr_per_m2: 25558
                    sample_count: 25
                    from_date: "2025-01-07"
                    to_date: "2025-12-22"
                    filters:
                      year: 2025
                      rooms: null
                by_rooms:
                  summary: Filter by number of rooms
                  value:
                    avg_kr_per_m2: 27095
                    sample_count: 90
                    from_date: "2012-11-02"
                    to_date: "2026-06-03"
                    filters:
                      year: null
                      rooms: 3.0
                by_year_and_rooms:
                  summary: Filter by year and rooms combined
                  value:
                    avg_kr_per_m2: 22639
                    sample_count: 7
                    from_date: "2025-01-07"
                    to_date: "2025-12-10"
                    filters:
                      year: 2025
                      rooms: 3.0
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                bad_year:
                  value:
                    error: year must be an integer
                bad_rooms:
                  value:
                    error: rooms must be a number
        "404":
          description: No sales match the given filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: no data found for the given filters

  /advertisements:
    get:
      summary: List property advertisements
      operationId: listAdvertisements
      description: >
        Returns property listings to support a purchase decision. Like sales,
        each row is fully self-contained (denormalized "One Big Table" model):
        besides the listing's own fields it embeds the housing cooperative
        (brf_*) and the five geographically nearest schools (school_1..5_*), plus
        a derived `avg_school_socio_index` summarising school quality nearby.


        The result set is **capped at 10 rows**. Rather than paging the whole
        market, choose a `sort` that matches what you're optimising for (lowest
        price per m², largest BRF, best nearby schools, …) and narrow with the
        filters below; you then get the 10 best matches in one cheap request.
        Default order is most recently listed first.
      parameters:
        - name: property_type
          in: query
          required: false
          description: Restrict to one dwelling type.
          schema:
            type: string
            enum: [bostadsrätt, villa, radhus, fritidshus]
          example: bostadsrätt
        - name: min_rooms
          in: query
          required: false
          description: Only listings with at least this many rooms (e.g. 3 or 3.5).
          schema:
            type: number
            minimum: 0.5
            maximum: 20
          example: 3
        - name: sort
          in: query
          required: false
          description: >
            Ordering of the (capped) result set. `price_*` sorts on asking price,
            `price_per_sqm_*` on kr/m² (best value first with `_asc`),
            `rooms_*` on room count, `area_*` on living area,
            `fee_per_sqm_*` on the monthly avgift per m² (`_asc` = cheapest to own
            first), `fee_*` on the total monthly avgift in kr (`_asc` = lowest fee
            first), `brf_price_*` on the BRF's current-year (latest) average kr/m²,
            `construction_year_*` on the building's construction year
            (`_desc` = newest first), `brf_units_*` on the number of apartments in
            the cooperative, `brf_loan_*` on `brf_loan_per_m2` (the BRF's loan per
            m²; `_asc` = least-indebted first), `brf_trend_*` on
            `brf_kr_per_m2_trend` (the BRF's price/m² trend in kr per year; `_desc`
            = fastest appreciating first). The school sorts come in three radii —
            `school_index_1_*` (closest school), `school_index_3_*` (3 nearest) and
            `school_index_*` (5 nearest) — on the current latest-year
            socio-economic index (`_desc` = best first), with matching
            `school_forecast_1_*` / `school_forecast_3_*` / `school_forecast_*`
            on the same averages projected three years ahead from the recent-years
            trend. Listings missing the sorted value sort last.
          schema:
            type: string
            default: listed_date
            enum:
              - listed_date
              - price_asc
              - price_desc
              - price_per_sqm_asc
              - price_per_sqm_desc
              - rooms_asc
              - rooms_desc
              - area_asc
              - area_desc
              - fee_per_sqm_asc
              - fee_per_sqm_desc
              - fee_asc
              - fee_desc
              - construction_year_asc
              - construction_year_desc
              - brf_units_asc
              - brf_units_desc
              - brf_loan_asc
              - brf_loan_desc
              - brf_price_asc
              - brf_price_desc
              - brf_trend_asc
              - brf_trend_desc
              - school_index_1_asc
              - school_index_1_desc
              - school_index_3_asc
              - school_index_3_desc
              - school_index_asc
              - school_index_desc
              - school_forecast_1_asc
              - school_forecast_1_desc
              - school_forecast_3_asc
              - school_forecast_3_desc
              - school_forecast_asc
              - school_forecast_desc
          example: price_per_sqm_asc
        - name: min_price
          in: query
          required: false
          description: Only listings with an asking price of at least this many kronor.
          schema:
            type: integer
            minimum: 0
          example: 2000000
        - name: max_price
          in: query
          required: false
          description: Only listings with an asking price of at most this many kronor.
          schema:
            type: integer
            minimum: 0
          example: 5000000
        - name: max_kr_per_m2
          in: query
          required: false
          description: Only listings with a price per m² of at most this many kronor.
          schema:
            type: integer
            minimum: 0
          example: 60000
        - name: min_area_m2
          in: query
          required: false
          description: Only listings with at least this living area (m²).
          schema:
            type: number
            minimum: 0
          example: 60
        - name: max_area_m2
          in: query
          required: false
          description: Only listings with at most this living area (m²).
          schema:
            type: number
            minimum: 0
          example: 120
        - name: min_construction_year
          in: query
          required: false
          description: Only listings whose building was constructed in or after this year.
          schema:
            type: integer
            minimum: 1500
            maximum: 2100
          example: 1970
        - name: max_construction_year
          in: query
          required: false
          description: >
            Only listings whose building was constructed in or before this year
            (building age = current year − construction_year).
          schema:
            type: integer
            minimum: 1500
            maximum: 2100
          example: 2020
        - name: max_fee_per_sqm
          in: query
          required: false
          description: >
            Only listings whose monthly avgift per m² (`monthly_fee_per_m2`,
            kr/m²/month) is at most this value — caps ongoing carrying cost.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 80
        - name: max_monthly_fee
          in: query
          required: false
          description: >
            Only listings whose total monthly avgift (`monthly_fee_kr`, kr/month)
            is at most this value — caps the absolute fee regardless of size.
          schema:
            type: integer
            minimum: 0
          example: 5000
        - name: min_brf_units
          in: query
          required: false
          description: >
            Only listings whose cooperative has at least this many apartments
            (brf_num_units). Larger föreningar tend to spread shared costs wider.
          schema:
            type: integer
            minimum: 0
          example: 50
        - name: max_brf_loan_per_m2
          in: query
          required: false
          description: >
            Only listings whose BRF loan per m² (`brf_loan_per_m2`, kr/m²) is at
            most this value — a lower cap targets less-indebted föreningar.
          schema:
            type: integer
            minimum: 0
          example: 6000
        - name: min_brf_trend
          in: query
          required: false
          description: >
            Only listings whose `brf_kr_per_m2_trend` (the BRF's price/m² trend in
            kr per year, from its own sold listings) is at least this value. May be
            negative; use 0 to surface only föreningar with non-declining prices.
          schema:
            type: integer
          example: 0
        - name: min_school_index
          in: query
          required: false
          description: >
            Only listings whose `avg_school_socio_index` (average latest-year
            socio-economic index across the 5 nearest schools) is at least this value.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 90
        - name: min_school_index_3
          in: query
          required: false
          description: >
            Only listings whose `avg_school_socio_index_3` (average latest-year
            socio-economic index across the 3 nearest schools — a tighter radius)
            is at least this value.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 90
        - name: min_school_index_1
          in: query
          required: false
          description: >
            Only listings whose `avg_school_socio_index_1` (the closest school's
            latest-year socio-economic index) is at least this value.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 90
        - name: near_lat
          in: query
          required: false
          description: >
            Radius search — centre latitude (WGS84). Must be given together with
            `near_lng` and `radius_m`; returns only listings within that radius.
          schema:
            type: number
            minimum: -90
            maximum: 90
          example: 59.2435
        - name: near_lng
          in: query
          required: false
          description: Radius search — centre longitude (WGS84). See `near_lat`.
          schema:
            type: number
            minimum: -180
            maximum: 180
          example: 18.3012
        - name: radius_m
          in: query
          required: false
          description: >
            Radius search — radius in metres around (`near_lat`, `near_lng`). All
            three radius parameters must be supplied together (else HTTP 400).
          schema:
            type: integer
            minimum: 1
            maximum: 100000
          example: 1500
        - name: limit
          in: query
          required: false
          description: >
            Maximum number of rows to return (1–10). Capped at 10 by design — see
            the endpoint description; pick a `sort` and filters instead of paging.
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 10
      responses:
        "200":
          description: Advertisements returned (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertisementsList"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                bad_sort:
                  value:
                    error: "sort must be one of: area_asc, area_desc, brf_loan_asc, brf_loan_desc, brf_price_asc, brf_price_desc, brf_trend_asc, brf_trend_desc, brf_units_asc, brf_units_desc, construction_year_asc, construction_year_desc, fee_asc, fee_desc, fee_per_sqm_asc, fee_per_sqm_desc, listed_date, price_asc, price_desc, price_per_sqm_asc, price_per_sqm_desc, rooms_asc, rooms_desc, school_forecast_1_asc, school_forecast_1_desc, school_forecast_3_asc, school_forecast_3_desc, school_forecast_asc, school_forecast_desc, school_index_1_asc, school_index_1_desc, school_index_3_asc, school_index_3_desc, school_index_asc, school_index_desc"
                bad_limit:
                  value:
                    error: limit out of range (1-10)

components:
  schemas:
    AvgPricePerSqm:
      type: object
      required:
        - avg_kr_per_m2
        - sample_count
        - from_date
        - to_date
        - filters
      properties:
        avg_kr_per_m2:
          type: integer
          description: Average final sale price per square metre in Swedish kronor.
          example: 25558
        sample_count:
          type: integer
          description: Number of sales that contributed to the average.
          example: 25
        from_date:
          type: string
          format: date
          description: Earliest sale date among the matched sales.
          example: "2025-01-07"
        to_date:
          type: string
          format: date
          description: Latest sale date among the matched sales.
          example: "2025-12-22"
        filters:
          type: object
          description: Echo of the filters that were applied.
          properties:
            year:
              type: integer
              nullable: true
              example: 2025
            rooms:
              type: number
              nullable: true
              example: 3.0

    AdvertisementsList:
      type: object
      required:
        - advertisements
        - count
        - filters
      properties:
        advertisements:
          type: array
          items:
            $ref: "#/components/schemas/Advertisement"
        count:
          type: integer
          description: Number of rows returned (at most 10).
          example: 10
        filters:
          type: object
          description: Echo of the filters and sort that were applied.
          properties:
            property_type:
              type: string
              nullable: true
            min_rooms:
              type: number
              nullable: true
            sort:
              type: string
              example: price_per_sqm_asc
            min_price:
              type: integer
              nullable: true
            max_price:
              type: integer
              nullable: true
            max_kr_per_m2:
              type: integer
              nullable: true
            min_area_m2:
              type: number
              nullable: true
            max_area_m2:
              type: number
              nullable: true
            min_construction_year:
              type: integer
              nullable: true
            max_construction_year:
              type: integer
              nullable: true
            max_fee_per_sqm:
              type: number
              nullable: true
            max_monthly_fee:
              type: integer
              nullable: true
            min_brf_units:
              type: integer
              nullable: true
            max_brf_loan_per_m2:
              type: integer
              nullable: true
            min_brf_trend:
              type: integer
              nullable: true
            min_school_index:
              type: number
              nullable: true
            min_school_index_1:
              type: number
              nullable: true
            min_school_index_3:
              type: number
              nullable: true
            near_lat:
              type: number
              nullable: true
            near_lng:
              type: number
              nullable: true
            radius_m:
              type: integer
              nullable: true
            limit:
              type: integer
              example: 10

    Advertisement:
      type: object
      description: >
        A property listing, fully denormalized — one flat row, no nested objects
        except `location`. Fields fall into three groups:

        • Listing core — listing_id, listed_date, asking_price_kr, property_type,
        street_name, street_number, apartment_number, rooms, living_area_m2,
        kr_per_m2, monthly_fee_kr (the BRF avgift in kr/month; NULL for listings
        with no fee), construction_year (the building's construction year),
        broker_agency, description, attributes (JSONB), photo_urls (ordered array
        of listing photos, primary first; each {url, primaryLabel, alt} so floor
        plans and maps are distinguishable from photos), source_url, kommun,
        location {lat, lng}.

        • BRF block (recovered by matching the listing address to the BRF
        residences export; NULL for non-coop listings or unmatched addresses) —
        brf_booli_id, brf_name, brf_org_number, brf_construction_year,
        brf_num_units, brf_num_rental_units, brf_total_living_area_m2,
        brf_plot_ownership, brf_is_genuine, brf_total_loan_kr,
        brf_annual_report_year, brf_has_valid_annual_report, brf_economy (JSONB).

        • Nearest-5 schools — school_1_* (closest) … school_5_*, each with:
        _skolenhetskod, _name, _type, _distance_m, _socio_index_2023 /
        _2024 / _2025 / _2026, _ineligible_pct_latest, _ineligible_pct_prev.
        Cross-school rollups are precomputed as flat columns at import time and
        ride along on every row, for three nearest-school radii (1 = closest, 3,
        5): a current latest-year average (`avg_school_socio_index_1` /
        `_3` / `avg_school_socio_index`) and a three-year-ahead projection of
        each (`avg_school_socio_index_1_forecast` / `_3_forecast` /
        `avg_school_socio_index_forecast`), fitted by least squares to each
        school's per-year history.

        The properties below are a representative sample; the authoritative full
        column list is src/db/schema.sql. additionalProperties is true so new
        flat columns appear without a spec change.
      additionalProperties: true
      properties:
        listing_id:
          type: string
          example: "4123456"
        listed_date:
          type: string
          format: date
          nullable: true
          example: "2026-05-30"
        asking_price_kr:
          type: integer
          nullable: true
          example: 3895000
        property_type:
          type: string
          example: bostadsrätt
        street_name:
          type: string
          example: Gusthemsvägen
        rooms:
          type: number
          example: 3.0
        living_area_m2:
          type: number
          example: 72.0
        kr_per_m2:
          type: integer
          nullable: true
          example: 54097
        monthly_fee_kr:
          type: integer
          nullable: true
          description: >
            BRF monthly fee (avgift) in kr; NULL when the listing has no fee. The
            value the `fee_*` sort and `max_monthly_fee` filter operate on.
          example: 4687
        monthly_fee_per_m2:
          type: number
          nullable: true
          description: >
            Avgift per m² (kr/m²/month), derived at import from monthly_fee_kr /
            living_area_m2. The value the `fee_per_sqm_*` sort and `max_fee_per_sqm`
            filter operate on. NULL when the fee or area is missing.
          example: 66.7
        construction_year:
          type: integer
          nullable: true
          description: >
            Year the building was constructed (from the listing detail page).
            Building age = current year − this. The value the
            `construction_year_*` sort and min/max_construction_year filters use.
          example: 1992
        photo_urls:
          type: array
          nullable: true
          description: >
            Ordered listing photos (Booli CDN, webp), primary image first. The
            full gallery from the listing's detail page — not capped. Each item
            is an object carrying the photo's URL plus its category. NULL when the
            listing has no photos.
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
                description: Booli CDN URL (1440px wide, webp).
              primaryLabel:
                type: string
                nullable: true
                description: >
                  Booli's category for the image — e.g. "floorplan" (planritning),
                  "property_map", "exterior", "interior", "kitchen/dining_room",
                  "bathroom/laundry", "balcony/view". NULL when Booli left the
                  image uncategorized.
                example: floorplan
              alt:
                type: string
                nullable: true
                description: Swedish alt text Booli provides for the image.
                example: Planlösning
          example:
            - url: https://bcdn.se/images/cache/54230613_1440x0.webp
              primaryLabel: exterior
              alt: Exteriörbild
            - url: https://bcdn.se/images/cache/54244810_1440x0.webp
              primaryLabel: floorplan
              alt: Planlösning
        kommun:
          type: string
          example: Tyresö
        location:
          type: object
          nullable: true
          properties:
            lat:
              type: number
              example: 59.237
            lng:
              type: number
              example: 18.301
        brf_name:
          type: string
          nullable: true
          example: Brf Sjötungan
        brf_num_units:
          type: integer
          nullable: true
          description: Total number of apartments in the cooperative.
          example: 120
        brf_kr_per_m2_trend:
          type: integer
          nullable: true
          description: >
            The BRF's price/m² trend in kr per year, derived at import from the
            förening's own completed sales (least-squares slope over sold date).
            Negative when prices are declining. NULL with fewer than two priced
            sales. The value the `brf_trend_*` sort and `min_brf_trend` filter
            operate on.
          example: 1850
        brf_kr_per_m2_2026:
          type: integer
          nullable: true
          description: >
            The BRF's average kr/m² for 2026 (the current year) from its own
            completed sales — the latest point of the per-year history
            `brf_kr_per_m2_2021 … brf_kr_per_m2_2026` (each derived at import; NULL
            for a year with no priced sale). The value the `brf_price_*` sort
            operates on.
          example: 58200
        brf_loan_per_m2:
          type: number
          nullable: true
          description: >
            The BRF's loan per m² (kr/m²), derived at import from brf_total_loan_kr
            / brf_total_living_area_m2 (latest annual report). Only the current
            figure is available — Booli exposes no loan history, so there is no
            per-year series or trend. Lower means a less-indebted förening. The
            value the `brf_loan_*` sort and `max_brf_loan_per_m2` filter operate on.
          example: 4582.2
        school_1_name:
          type: string
          nullable: true
          example: Kumla skola
        school_1_distance_m:
          type: integer
          nullable: true
          description: Metres from the property to the nearest school.
          example: 420
        school_1_socio_index_2026:
          type: number
          nullable: true
          description: Latest-year socio-economic index of the nearest school.
          example: 92.0
        avg_school_socio_index_1:
          type: number
          nullable: true
          description: >
            The closest school's latest-year socio-economic index. The value the
            `school_index_1_*` sort and `min_school_index_1` filter operate on.
          example: 92.0
        avg_school_socio_index_3:
          type: number
          nullable: true
          description: >
            Average latest-year socio-economic index across the 3 nearest schools
            (a tighter radius). The value the `school_index_3_*` sort and
            `min_school_index_3` filter operate on.
          example: 89.1
        avg_school_socio_index:
          type: number
          nullable: true
          description: >
            Average latest-year socio-economic index across the (up to five)
            nearest schools, ignoring those whose index is suppressed. The value
            the `school_index_*` sort and `min_school_index` filter operate on.
          example: 88.4
        avg_school_socio_index_1_forecast:
          type: number
          nullable: true
          description: >
            Three-year-ahead least-squares projection of the closest school's
            index. Sort-only via `school_forecast_1_*`. NULL without enough history.
          example: 93.0
        avg_school_socio_index_3_forecast:
          type: number
          nullable: true
          description: >
            Three-year-ahead projection of `avg_school_socio_index_3`. Sort-only
            via `school_forecast_3_*`. NULL without enough history.
          example: 90.0
        avg_school_socio_index_forecast:
          type: number
          nullable: true
          description: >
            Three-year-ahead projection of `avg_school_socio_index`. For each of
            the nearest schools a least-squares line is fitted to its available
            per-year socio-economic index (2023–2026) and extrapolated; those
            per-school projections are averaged, ignoring schools with fewer than
            two years of data. Sort-only via `school_forecast_*`. NULL when no
