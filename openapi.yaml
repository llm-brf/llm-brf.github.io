openapi: 3.0.3
info:
  title: Real Estate Data API
  description: >
    Read-only API for Swedish real estate market data sourced from Booli.
    Covers completed sales transactions and property advertisements.
  version: 0.1.0
  contact:
    url: https://github.com/asapozhkov

servers:
  - url: https://wqyh106uo0.execute-api.eu-north-1.amazonaws.com
    description: Production

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /sales/stats/avg-price-per-sqm:
    get:
      summary: Average sale price per square metre
      operationId: getSalesStatsAvgPricePerSqm
      description: >
        Returns the average final sale price per square metre (kr/m²) across
        completed sales in the database. Both query parameters are optional and
        can be combined. The response always includes the date range and number
        of sales that contributed to the average so the caller can judge
        statistical significance.
      parameters:
        - name: year
          in: query
          required: false
          description: Restrict to sales in this calendar year.
          schema:
            type: integer
            minimum: 1900
            maximum: 2100
          example: 2025
        - name: rooms
          in: query
          required: false
          description: >
            Restrict to sales where the number of rooms matches exactly.
            Accepts integers and half-values (e.g. 3 or 3.5).
          schema:
            type: number
            minimum: 0.5
            maximum: 20
          example: 3
      responses:
        "200":
          description: Average successfully computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvgPricePerSqm"
              examples:
                all_data:
                  summary: No filters — all 375 sales
                  value:
                    avg_kr_per_m2: 29112
                    sample_count: 375
                    from_date: "2012-11-02"
                    to_date: "2026-06-03"
                    filters:
                      year: null
                      rooms: null
                by_year:
                  summary: Filter by year
                  value:
                    avg_kr_per_m2: 25558
                    sample_count: 25
                    from_date: "2025-01-07"
                    to_date: "2025-12-22"
                    filters:
                      year: 2025
                      rooms: null
                by_rooms:
                  summary: Filter by number of rooms
                  value:
                    avg_kr_per_m2: 27095
                    sample_count: 90
                    from_date: "2012-11-02"
                    to_date: "2026-06-03"
                    filters:
                      year: null
                      rooms: 3.0
                by_year_and_rooms:
                  summary: Filter by year and rooms combined
                  value:
                    avg_kr_per_m2: 22639
                    sample_count: 7
                    from_date: "2025-01-07"
                    to_date: "2025-12-10"
                    filters:
                      year: 2025
                      rooms: 3.0
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                bad_year:
                  value:
                    error: year must be an integer
                bad_rooms:
                  value:
                    error: rooms must be a number
        "404":
          description: No sales match the given filters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: no data found for the given filters

  /advertisements:
    get:
      summary: List property advertisements
      operationId: listAdvertisements
      description: >
        Returns property listings to support a purchase decision. Like sales,
        each row is fully self-contained (denormalized "One Big Table" model):
        besides the listing's own fields it embeds the housing cooperative
        (brf_*) and the five geographically nearest schools (school_1..5_*), plus
        a derived `avg_school_socio_index` averaging the socio-economic index of
        nearby schools. This is Skolverket's *Index på skolenhetsnivå*
        (socioekonomiskt index); a higher value corresponds to a higher modelled
        share of students not expected to become eligible for a national
        programme in upper-secondary school. See the `avg_school_socio_index`
        field for the full definition and the source link.


        The result set is **capped at 10 rows**. Rather than paging the whole
        market, choose a `sort` that matches what you're optimising for (lowest
        price per m², largest BRF, nearby-school socio-economic index, …) and
        narrow with the
        filters below; you then get the 10 best matches in one cheap request.
        Default order is most recently listed first.
      parameters:
        - name: property_type
          in: query
          required: false
          description: Restrict to one dwelling type.
          schema:
            type: string
            enum: [bostadsrätt, villa, radhus, fritidshus]
          example: bostadsrätt
        - name: kommun
          in: query
          required: false
          description: >
            Restrict to listings in a single kommun. Exact match on the stored
            kommun name (case and spelling must match, e.g. `Tyresö`). Call
            `GET /kommuns` to enumerate the values this filter accepts.
          schema:
            type: string
            maxLength: 100
          example: Tyresö
        - name: omrade
          in: query
          required: false
          description: >
            Restrict to listings in a single område (sub-kommun neighborhood /
            stadsdel, e.g. `Trollbäcken`). Exact match on the stored area name.
            Usually combined with `kommun`, since område names recur across
            kommuns. Call `GET /areas` to enumerate the values this filter accepts.
          schema:
            type: string
            maxLength: 100
          example: Trollbäcken
        - name: min_rooms
          in: query
          required: false
          description: Only listings with at least this many rooms (e.g. 3 or 3.5).
          schema:
            type: number
            minimum: 0.5
            maximum: 20
          example: 3
        - name: sort
          in: query
          required: false
          description: >
            Ordering of the (capped) result set. `price_*` sorts on asking price,
            `price_per_sqm_*` on kr/m² (best value first with `_asc`),
            `rooms_*` on room count, `area_*` on living area,
            `fee_per_sqm_*` on the monthly avgift per m² (`_asc` = cheapest to own
            first), `fee_*` on the total monthly avgift in kr (`_asc` = lowest fee
            first), `brf_price_*` on the BRF's current-year (latest) average kr/m²,
            `construction_year_*` on the building's construction year
            (`_desc` = newest first), `brf_units_*` on the number of apartments in
            the cooperative, `brf_loan_*` on `brf_loan_per_m2` (the BRF's loan per
            m²; `_asc` = least-indebted first), `brf_trend_*` on
            `brf_kr_per_m2_trend` (the BRF's price/m² trend in kr per year; `_desc`
            = fastest appreciating first), `brf_fee_*` on the BRF's current-year
            (latest) average avgift per m² (`_asc` = cheapest to own first) and
            `brf_fee_trend_*` on `brf_fee_per_m2_trend` (the BRF's avgift/m² trend
            in kr per year; `_asc` = slowest fee growth first).
            `brf_pct_for_sale_*` sorts on `brf_pct_for_sale` (the share of the
            BRF's apartments currently listed; `_asc` = most stable / fewest on
            the market first). The all-history
            `brf_trend_*`/`brf_fee_trend_*` slopes have **windowed** counterparts
            fit over only the last 5 years — `brf_price_trend_5y_*` and
            `brf_fee_trend_5y_*` — plus forward projections of each metric three
            years past the latest year: `brf_price_forecast_*` (projected kr/m²;
            `_desc` = highest projected price first) and `brf_fee_forecast_*`
            (projected avgift/m²; `_asc` = lowest projected fee first). The school sorts come in three radii —
            `school_index_1_*` (closest school), `school_index_3_*` (3 nearest) and
            `school_index_*` (5 nearest) — on the current latest-year
            socio-economic index (Skolverket's *Index på skolenhetsnivå*; a
            higher value = a higher modelled share of students not expected to
            become eligible for upper-secondary school — see
            `avg_school_socio_index`). `_desc` sorts highest index first, `_asc`
            lowest. With matching
            `school_forecast_1_*` / `school_forecast_3_*` / `school_forecast_*`
            on the same averages projected three years ahead from the recent-years
            trend. Listings missing the sorted value sort last.
          schema:
            type: string
            default: listed_date
            enum:
              - listed_date
              - price_asc
              - price_desc
              - price_per_sqm_asc
              - price_per_sqm_desc
              - rooms_asc
              - rooms_desc
              - area_asc
              - area_desc
              - fee_per_sqm_asc
              - fee_per_sqm_desc
              - fee_asc
              - fee_desc
              - construction_year_asc
              - construction_year_desc
              - brf_units_asc
              - brf_units_desc
              - brf_loan_asc
              - brf_loan_desc
              - brf_price_asc
              - brf_price_desc
              - brf_trend_asc
              - brf_trend_desc
              - brf_fee_asc
              - brf_fee_desc
              - brf_pct_for_sale_asc
              - brf_pct_for_sale_desc
              - brf_fee_trend_asc
              - brf_fee_trend_desc
              - brf_price_trend_5y_asc
              - brf_price_trend_5y_desc
              - brf_price_forecast_asc
              - brf_price_forecast_desc
              - brf_fee_trend_5y_asc
              - brf_fee_trend_5y_desc
              - brf_fee_forecast_asc
              - brf_fee_forecast_desc
              - school_index_1_asc
              - school_index_1_desc
              - school_index_3_asc
              - school_index_3_desc
              - school_index_asc
              - school_index_desc
              - school_forecast_1_asc
              - school_forecast_1_desc
              - school_forecast_3_asc
              - school_forecast_3_desc
              - school_forecast_asc
              - school_forecast_desc
          example: price_per_sqm_asc
        - name: min_price
          in: query
          required: false
          description: Only listings with an asking price of at least this many kronor.
          schema:
            type: integer
            minimum: 0
          example: 2000000
        - name: max_price
          in: query
          required: false
          description: Only listings with an asking price of at most this many kronor.
          schema:
            type: integer
            minimum: 0
          example: 5000000
        - name: max_kr_per_m2
          in: query
          required: false
          description: Only listings with a price per m² of at most this many kronor.
          schema:
            type: integer
            minimum: 0
          example: 60000
        - name: min_area_m2
          in: query
          required: false
          description: Only listings with at least this living area (m²).
          schema:
            type: number
            minimum: 0
          example: 60
        - name: max_area_m2
          in: query
          required: false
          description: Only listings with at most this living area (m²).
          schema:
            type: number
            minimum: 0
          example: 120
        - name: min_construction_year
          in: query
          required: false
          description: Only listings whose building was constructed in or after this year.
          schema:
            type: integer
            minimum: 1500
            maximum: 2100
          example: 1970
        - name: max_construction_year
          in: query
          required: false
          description: >
            Only listings whose building was constructed in or before this year
            (building age = current year − construction_year).
          schema:
            type: integer
            minimum: 1500
            maximum: 2100
          example: 2020
        - name: max_fee_per_sqm
          in: query
          required: false
          description: >
            Only listings whose monthly avgift per m² (`monthly_fee_per_m2`,
            kr/m²/month) is at most this value — caps ongoing carrying cost.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 80
        - name: max_monthly_fee
          in: query
          required: false
          description: >
            Only listings whose total monthly avgift (`monthly_fee_kr`, kr/month)
            is at most this value — caps the absolute fee regardless of size.
          schema:
            type: integer
            minimum: 0
          example: 5000
        - name: brf_org_number
          in: query
          required: false
          description: >
            Only listings belonging to the cooperative with this exact Swedish
            org.nr (`brf_org_number`) — the identity filter for "all listings of
            one BRF". Accepted with or without the hyphen (`769625-3744` or
            `7696253744`); both normalise to the stored `NNNNNN-NNNN` form. A
            value that is not 10 digits returns HTTP 400.
          schema:
            type: string
            pattern: '^\d{6}-?\d{4}$'
          example: "769625-3744"
        - name: min_brf_units
          in: query
          required: false
          description: >
            Only listings whose cooperative has at least this many apartments
            (brf_num_units). Larger föreningar tend to spread shared costs wider.
          schema:
            type: integer
            minimum: 0
          example: 50
        - name: max_brf_loan_per_m2
          in: query
          required: false
          description: >
            Only listings whose BRF loan per m² (`brf_loan_per_m2`, kr/m²) is at
            most this value — a lower cap targets less-indebted föreningar.
          schema:
            type: integer
            minimum: 0
          example: 6000
        - name: min_brf_trend
          in: query
          required: false
          description: >
            Only listings whose `brf_kr_per_m2_trend` (the BRF's price/m² trend in
            kr per year, from its own sold listings) is at least this value. May be
            negative; use 0 to surface only föreningar with non-declining prices.
          schema:
            type: integer
          example: 0
        - name: max_brf_fee_trend
          in: query
          required: false
          description: >
            Only listings whose `brf_fee_per_m2_trend` (the BRF's avgift/m² trend in
            kr per year, from its own sold listings) is at most this value — a lower
            cap targets föreningar with the most controlled fee growth. May be
            negative; use 0 to surface only föreningar with non-rising fees.
          schema:
            type: number
          example: 5
        - name: min_brf_price_trend_5y
          in: query
          required: false
          description: >
            Only listings whose `brf_kr_per_m2_trend_5y` (the BRF's price/m² trend in
            kr per year, fit over only the **last 5 years** of its sold listings) is
            at least this value. The recent-momentum counterpart of `min_brf_trend`,
            which spans the BRF's entire history. May be negative.
          schema:
            type: integer
          example: 0
        - name: min_brf_price_forecast
          in: query
          required: false
          description: >
            Only listings whose `brf_kr_per_m2_forecast` (the BRF's price/m²
            projected 3 years past the latest year from its 5-year trend) is at least
            this value — a floor on the projected future price level.
          schema:
            type: integer
            minimum: 0
          example: 50000
        - name: max_brf_fee_trend_5y
          in: query
          required: false
          description: >
            Only listings whose `brf_fee_per_m2_trend_5y` (the BRF's avgift/m² trend
            in kr per year, fit over only the **last 5 years**) is at most this value
            — the recent-momentum counterpart of `max_brf_fee_trend`. May be negative.
          schema:
            type: number
          example: 5
        - name: max_brf_fee_forecast
          in: query
          required: false
          description: >
            Only listings whose `brf_fee_per_m2_forecast` (the BRF's avgift/m²
            projected 3 years past the latest year from its 5-year trend) is at most
            this value — a cap on the projected future monthly fee per m².
          schema:
            type: number
            minimum: 0
          example: 80
        - name: min_brf_pct_for_sale
          in: query
          required: false
          description: >
            Only listings whose `brf_pct_for_sale` (the share of the BRF's
            apartments currently on the market, in percent) is at least this
            value — surfaces föreningar with unusually high turnover.
          schema:
            type: number
            minimum: 0
          example: 5
        - name: max_brf_pct_for_sale
          in: query
          required: false
          description: >
            Only listings whose `brf_pct_for_sale` (the share of the BRF's
            apartments currently on the market, in percent) is at most this
            value — targets stable föreningar with few apartments listed.
          schema:
            type: number
            minimum: 0
          example: 10
        - name: min_school_index
          in: query
          required: false
          description: >
            Only listings whose `avg_school_socio_index` (average latest-year
            socio-economic index across the 5 nearest schools) is at least this
            value. A higher index = a higher modelled share of students not
            expected to become eligible for upper-secondary school (see
            `avg_school_socio_index`), so this filter keeps areas at or above
            that index level.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 90
        - name: min_school_index_3
          in: query
          required: false
          description: >
            Only listings whose `avg_school_socio_index_3` (average latest-year
            socio-economic index across the 3 nearest schools — a tighter radius)
            is at least this value.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 90
        - name: min_school_index_1
          in: query
          required: false
          description: >
            Only listings whose `avg_school_socio_index_1` (the closest school's
            latest-year socio-economic index) is at least this value.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 90
        - name: near_lat
          in: query
          required: false
          description: >
            Radius search — centre latitude (WGS84). Must be given together with
            `near_lng` and `radius_m`; returns only listings within that radius.
          schema:
            type: number
            minimum: -90
            maximum: 90
          example: 59.2435
        - name: near_lng
          in: query
          required: false
          description: Radius search — centre longitude (WGS84). See `near_lat`.
          schema:
            type: number
            minimum: -180
            maximum: 180
          example: 18.3012
        - name: radius_m
          in: query
          required: false
          description: >
            Radius search — radius in metres around (`near_lat`, `near_lng`). All
            three radius parameters must be supplied together (else HTTP 400).
          schema:
            type: integer
            minimum: 1
            maximum: 100000
          example: 1500
        - name: limit
          in: query
          required: false
          description: >
            Maximum number of rows to return (1–10). Capped at 10 by design — see
            the endpoint description; pick a `sort` and filters instead of paging.
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 10
      responses:
        "200":
          description: Advertisements returned (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertisementsList"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                bad_sort:
                  value:
                    error: "sort must be one of: area_asc, area_desc, brf_fee_asc, brf_fee_desc, brf_fee_forecast_asc, brf_fee_forecast_desc, brf_fee_trend_5y_asc, brf_fee_trend_5y_desc, brf_fee_trend_asc, brf_fee_trend_desc, brf_loan_asc, brf_loan_desc, brf_pct_for_sale_asc, brf_pct_for_sale_desc, brf_price_asc, brf_price_desc, brf_price_forecast_asc, brf_price_forecast_desc, brf_price_trend_5y_asc, brf_price_trend_5y_desc, brf_trend_asc, brf_trend_desc, brf_units_asc, brf_units_desc, construction_year_asc, construction_year_desc, fee_asc, fee_desc, fee_per_sqm_asc, fee_per_sqm_desc, listed_date, price_asc, price_desc, price_per_sqm_asc, price_per_sqm_desc, rooms_asc, rooms_desc, school_forecast_1_asc, school_forecast_1_desc, school_forecast_3_asc, school_forecast_3_desc, school_forecast_asc, school_forecast_desc, school_index_1_asc, school_index_1_desc, school_index_3_asc, school_index_3_desc, school_index_asc, school_index_desc"
                bad_limit:
                  value:
                    error: limit out of range (1-10)
                bad_brf_org_number:
                  value:
                    error: brf_org_number must be 10 digits (NNNNNN-NNNN)

  /cities:
    get:
      summary: List cities (top of the geo hierarchy)
      operationId: listCities
      description: >
        Returns one row per city — the level above kommun, an explicit grouping of
        kommuns (e.g. "Stockholm" spans every Stockholms-län kommun), ordered by
        name. Each row carries its current listing_count and the aggregated-up
        avg/median asking price per m² (kr/m²) and avgift per m² over the city's
        current advertisements. The root of the hierarchical-stats model, so it has
        no copied-down parent columns. Backed by a small reference table refreshed
        on each data import — not a live scan of the listings.
      responses:
        "200":
          description: Cities returned (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitiesList"

  /kommuns:
    get:
      summary: List available kommuns
      operationId: listKommuns
      description: >
        Returns every kommun present in the dataset, each with its current
        number of listings, ordered by name. Use this to populate a kommun
        picker and to discover the exact values the `kommun` filter on
        `GET /advertisements` accepts. Each kommun also carries `price_stats`:
        the average and median sale price per m² (kr/m²) per year and object
        type (bostadsrätt, villa, radhus, …), newest year first. Backed by a
        small reference table refreshed on each data import — not a live scan
        of the listings.
      responses:
        "200":
          description: Kommuns returned (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KommunsList"

  /areas:
    get:
      summary: List sub-kommun områden (neighborhoods / stadsdelar)
      operationId: listAreas
      description: >
        Returns the områden (sub-kommun neighborhoods / stadsdelar) present in the
        dataset, one row per `(kommun, område)` with its current number of
        listings, ordered by kommun then område. The område is the geographic tier
        between a whole kommun and a single BRF. Use this to populate an område
        picker, to discover the exact values the `omrade` filter on
        `GET /advertisements` and `GET /brfs` accepts, and to answer "how many
        områden are in kommun X" (call with `?kommun=X`). Backed by a small
        reference table refreshed on each data import — not a live scan of the
        listings.
      parameters:
        - name: kommun
          in: query
          required: false
          description: >
            Restrict the catalogue to a single kommun (exact match). Discover
            valid values via `GET /kommuns`.
          schema:
            type: string
            maxLength: 100
          example: Tyresö
        - name: name_search
          in: query
          required: false
          description: >
            Case-insensitive substring match against the område name — use when
            the exact name is unknown (e.g. `troll` matches "Trollbäcken"). LIKE
            metacharacters are matched literally.
          schema:
            type: string
            maxLength: 100
          example: troll
      responses:
        "200":
          description: Områden returned (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AreasList"

  /brfs:
    get:
      summary: List housing cooperatives (browse & rank BRFs)
      operationId: listBrfs
      description: >
        Returns one row per housing cooperative (förening) to support a
        purchase decision at the BRF level rather than the individual listing.
        Each row carries the BRF's identity, physical facts, financial health
        (loan per m²), the full per-year price and avgift history with their
        trends and three-year-ahead forecasts, the share of the BRF currently
        on the market, and aggregates over the förening's **current**
        advertisements (count + min/max/avg kr/m²).


        Backed by a small materialized table (one row per `brf_org_number`,
        ~88 rows) refreshed on each data import — not a live scan of the
        listings. The result set is **capped at 10 rows**: choose a `sort` that
        matches what you're optimising for (cheapest to own, fastest
        appreciating, least indebted, most/least turnover, …) and narrow with
        the filters. To then see a BRF's individual listings, call
        `GET /advertisements?brf_org_number=<the BRF's org.nr>`.
      parameters:
        - name: brf_name_search
          in: query
          required: false
          description: >
            Case-insensitive substring match against the BRF name — use when the
            exact name is unknown (e.g. `sjö` matches "Brf Sjötungan"). LIKE
            metacharacters are matched literally.
          schema:
            type: string
            maxLength: 100
          example: sjö
        - name: kommun
          in: query
          required: false
          description: >
            Restrict to cooperatives in this municipality (exact match). Discover
            valid values via `GET /kommuns`.
          schema:
            type: string
          example: Tyresö
        - name: omrade
          in: query
          required: false
          description: >
            Restrict to cooperatives in a single område (sub-kommun neighborhood /
            stadsdel, e.g. `Trollbäcken`; exact match). Usually combined with
            `kommun`. Discover valid values via `GET /areas`.
          schema:
            type: string
            maxLength: 100
          example: Trollbäcken
        - name: sort
          in: query
          required: false
          description: >
            Ordering of the (capped) result set. `name_*`/`kommun_*` sort
            alphabetically; `units_*` on the number of apartments;
            `construction_year_*` on the building year (`_desc` = newest first);
            `loan_*` on `brf_loan_per_m2` (`_asc` = least indebted first);
            `price_*` on the BRF's current-year (latest) average kr/m²;
            `price_trend_*` on the all-history price/m² trend, `price_trend_5y_*`
            on the 5-year window (`_desc` = fastest appreciating first),
            `price_forecast_*` on the projected kr/m²; `fee_*` on the current-year
            average avgift/m² (`_asc` = cheapest to own first), `fee_trend_*` /
            `fee_trend_5y_*` on the avgift/m² trend (`_asc` = slowest fee growth
            first), `fee_forecast_*` on the projected avgift/m²;
            `pct_for_sale_*` on the share of the BRF on the market
            (`_asc` = most stable first); `active_count_*` on the number of the
            BRF's current listings; `active_avg_price_*` on the average kr/m²
            of those listings. Rows missing the sorted value sort last.
          schema:
            type: string
            default: name_asc
            enum:
              - name_asc
              - name_desc
              - kommun_asc
              - kommun_desc
              - units_asc
              - units_desc
              - construction_year_asc
              - construction_year_desc
              - loan_asc
              - loan_desc
              - price_asc
              - price_desc
              - price_trend_asc
              - price_trend_desc
              - price_trend_5y_asc
              - price_trend_5y_desc
              - price_forecast_asc
              - price_forecast_desc
              - fee_asc
              - fee_desc
              - fee_trend_asc
              - fee_trend_desc
              - fee_trend_5y_asc
              - fee_trend_5y_desc
              - fee_forecast_asc
              - fee_forecast_desc
              - pct_for_sale_asc
              - pct_for_sale_desc
              - active_count_asc
              - active_count_desc
              - active_avg_price_asc
              - active_avg_price_desc
          example: pct_for_sale_desc
        - name: min_brf_units
          in: query
          required: false
          description: Only cooperatives with at least this many apartments.
          schema:
            type: integer
            minimum: 0
          example: 50
        - name: min_construction_year
          in: query
          required: false
          description: Only cooperatives whose building was constructed in or after this year.
          schema:
            type: integer
            minimum: 1500
            maximum: 2100
          example: 1970
        - name: max_construction_year
          in: query
          required: false
          description: Only cooperatives whose building was constructed in or before this year.
          schema:
            type: integer
            minimum: 1500
            maximum: 2100
          example: 2020
        - name: max_brf_loan_per_m2
          in: query
          required: false
          description: >
            Only cooperatives whose loan per m² (`brf_loan_per_m2`, kr/m²) is at
            most this value — a lower cap targets less-indebted föreningar.
          schema:
            type: integer
            minimum: 0
          example: 6000
        - name: min_brf_price_trend_5y
          in: query
          required: false
          description: >
            Only cooperatives whose `brf_kr_per_m2_trend_5y` (price/m² trend in kr
            per year, fit over the last 5 years) is at least this value. May be
            negative; use 0 to surface only non-declining föreningar.
          schema:
            type: integer
          example: 0
        - name: min_brf_price_forecast
          in: query
          required: false
          description: >
            Only cooperatives whose `brf_kr_per_m2_forecast` (price/m² projected
            3 years past the latest year) is at least this value.
          schema:
            type: integer
            minimum: 0
          example: 50000
        - name: max_brf_fee_trend_5y
          in: query
          required: false
          description: >
            Only cooperatives whose `brf_fee_per_m2_trend_5y` (avgift/m² trend in
            kr per year over the last 5 years) is at most this value. May be
            negative; use 0 to surface only föreningar with non-rising fees.
          schema:
            type: number
          example: 5
        - name: max_brf_fee_forecast
          in: query
          required: false
          description: >
            Only cooperatives whose `brf_fee_per_m2_forecast` (avgift/m² projected
            3 years past the latest year) is at most this value.
          schema:
            type: number
            minimum: 0
            maximum: 1000
          example: 80
        - name: min_brf_pct_for_sale
          in: query
          required: false
          description: >
            Only cooperatives whose `brf_pct_for_sale` (share of apartments
            currently listed, percent) is at least this value — high turnover.
          schema:
            type: number
            minimum: 0
          example: 5
        - name: max_brf_pct_for_sale
          in: query
          required: false
          description: >
            Only cooperatives whose `brf_pct_for_sale` is at most this value —
            stable föreningar with few apartments on the market.
          schema:
            type: number
            minimum: 0
          example: 10
        - name: min_active_listings
          in: query
          required: false
          description: >
            Only cooperatives with at least this many current advertisements
            (`active_listing_count`).
          schema:
            type: integer
            minimum: 0
          example: 1
        - name: limit
          in: query
          required: false
          description: Maximum number of rows to return (1–10). Capped at 10 by design.
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 10
      responses:
        "200":
          description: BRFs returned (possibly empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrfsList"
        "400":
          description: Invalid query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                bad_sort:
                  value:
                    error: "sort must be one of: active_avg_price_asc, …"
                bad_limit:
                  value:
                    error: limit out of range (1-10)

components:
  schemas:
    AvgPricePerSqm:
      type: object
      required:
        - avg_kr_per_m2
        - sample_count
        - from_date
        - to_date
        - filters
      properties:
        avg_kr_per_m2:
          type: integer
          description: Average final sale price per square metre in Swedish kronor.
          example: 25558
        sample_count:
          type: integer
          description: Number of sales that contributed to the average.
          example: 25
        from_date:
          type: string
          format: date
          description: Earliest sale date among the matched sales.
          example: "2025-01-07"
        to_date:
          type: string
          format: date
          description: Latest sale date among the matched sales.
          example: "2025-12-22"
        filters:
          type: object
          description: Echo of the filters that were applied.
          properties:
            year:
              type: integer
              nullable: true
              example: 2025
            rooms:
              type: number
              nullable: true
              example: 3.0

    CitiesList:
      type: object
      required:
        - cities
        - count
      properties:
        cities:
          type: array
          items:
            type: object
            # Per-boende-type stats are segmented by object_type with a <type>
            # suffix (br / villa / radhus / fritids). The properties below are a
            # representative sample; the authoritative full set is the cities table
            # in src/db/schema.sql (see docs/hierarchical-stats.md).
            additionalProperties: true
            required:
              - city
              - listing_count
            properties:
              city:
                type: string
                description: City name; the top of the geo hierarchy.
                example: Stockholm
              listing_count:
                type: integer
                description: Total advertisements currently in this city (all boende types).
                example: 4300
              listing_count_br:
                type: integer
                description: >
                  Sample size for the bostadsrätt stats — carried beside every stat
                  so low-sample (noisy) cells can be filtered. One per type
                  (listing_count_villa / _radhus / _fritids).
                example: 3600
              avg_kr_per_m2_br:
                type: integer
                nullable: true
                description: >
                  Aggregated-up mean asking price per m² for bostadsrätter, over the
                  city's current advertisements. Per type: _br / _villa / _radhus /
                  _fritids.
                example: 79000
              median_kr_per_m2_br:
                type: integer
                nullable: true
                description: Aggregated-up median asking price per m² for bostadsrätter (per type).
                example: 78000
              avg_fee_per_m2_br:
                type: number
                nullable: true
                description: Mean avgift per m²/month (bostadsrätt only — fee is a BRF concept).
                example: 54.0
              median_fee_per_m2_br:
                type: number
                nullable: true
                description: Median avgift per m²/month (bostadsrätt only).
                example: 53.0
              units_in_scope_br:
                type: integer
                nullable: true
                description: >
                  Σ brf_num_units over the city's distinct BRFs — the cooperative
                  housing stock in import scope.
                example: 52000
              pct_for_sale_br:
                type: number
                nullable: true
                description: Share of that stock currently listed (listing_count_br / units_in_scope_br × 100).
                example: 6.9
              num_sales_br_2026:
                type: integer
                nullable: true
                description: >
                  SOLD-HISTORY (self, BR completed sales): number of bostadsrätt sales
                  in 2026. One per year `num_sales_br_2021…2026`. This block is on every
                  geo level (cities/kommuns/areas) and on the BRF (as `brf_num_sales_*`).
                example: 1800
              turnover_br_2026:
                type: number
                nullable: true
                description: >
                  Share of the BR unit stock sold in 2026 (`num_sales_br_2026 /
                  units_in_scope_br × 100`); per year `turnover_br_2021…2026`, plus the
                  cumulative `turnover_br_agg_3y` / `turnover_br_agg_5y`.
                example: 3.5
              sold_kr_per_m2_br_2026:
                type: integer
                nullable: true
                description: >
                  Average SOLD price/m² in 2026, segmented PER boende type like the
                  snapshot — `sold_kr_per_m2_{br,villa,radhus,fritids}_<year>` (per year
                  `…_2021…2026`) with `…_trend_3y` / `_trend_5y` / `_forecast` each. The
                  avgift/m² counterpart `sold_fee_per_m2_br_*` is bostadsrätt-only.
                  Distinct from the current-listing `avg_kr_per_m2_br` snapshot (asking,
                  not sold).
                example: 79000
              school_socio_index_2026:
                type: number
                nullable: true
                description: >
                  Pooled SOLD-era school history (self): mean over the level's listings
                  of each listing's nearest-5-school socio index for 2026 (per year
                  `school_socio_index_2023…2026`), with `school_socio_index_trend_3y` /
                  `_trend_5y` / `_forecast`. Not per-type (school is a place attribute);
                  the latest-year value equals the snapshot `avg_school_socio_index`.
                example: 102.5
              avg_loan_per_m2_br:
                type: number
                nullable: true
                description: >
                  Mean BRF loan per m² over the city's bostadsrätt listings (BRF
                  balance-sheet health; median_loan_per_m2_br alongside). Bostadsrätt
                  only.
                example: 5200.0
              median_living_area_m2_br:
                type: number
                nullable: true
                description: >
                  Median dwelling size (m²) for bostadsrätter — context for kr/m²
                  (per type: _br / _villa / _radhus / _fritids).
                example: 62.0
              avg_school_socio_index:
                type: number
                nullable: true
                description: >
                  Pooled (not per-type) mean of each listing's avg_school_socio_index
                  (its 5-nearest-school socio-economic average) over the city's
                  advertisements — the school environment. median_school_socio_index
                  is alongside. School quality is a place attribute, so it is not
                  segmented by boende type.
                example: 102.3
        count:
          type: integer
          description: Number of distinct cities returned.
          example: 1

    KommunsList:
      type: object
      required:
        - kommuns
        - count
      properties:
        kommuns:
          type: array
          items:
            type: object
            # Per-type stats use a <type> suffix (br / villa / radhus / fritids);
            # the sample below is representative, full set in src/db/schema.sql.
            additionalProperties: true
            required:
              - kommun
              - listing_count
              - price_stats
            properties:
              kommun:
                type: string
                description: Kommun name; the exact value the `kommun` filter accepts.
                example: Tyresö
              listing_count:
                type: integer
                description: Number of advertisements currently in this kommun.
                example: 433
              city:
                type: string
                nullable: true
                description: >
                  The city this kommun belongs to (the level above kommun, an
                  explicit grouping — see the hierarchical-stats model). NULL when
                  the kommun is not mapped to a city.
                example: Stockholm
              listing_count_br:
                type: integer
                description: Sample size for the bostadsrätt stats (one per type; see /cities).
                example: 380
              median_kr_per_m2_br:
                type: integer
                nullable: true
                description: >
                  Aggregated-up median asking price per m² for bostadsrätter over this
                  kommun's CURRENT advertisements (per type: _br / _villa / _radhus /
                  _fritids). Distinct from price_stats, which is over completed sales,
                  per year. Divide a BRF's median by this for a like-for-like ratio.
                example: 79500
              city_median_kr_per_m2_br:
                type: integer
                nullable: true
                description: >
                  COPIED DOWN from the parent city — the city's median_kr_per_m2_br,
                  so a single GET /kommuns row carries both the kommun's stat and its
                  city's. Divide median_kr_per_m2_br by this for the kommun-vs-city
                  ratio. The full parent set is city_<agg>_<metric>_<type> (+ city fee).
                example: 78000
              median_fee_per_m2_br:
                type: number
                nullable: true
                description: Median avgift per m²/month (bostadsrätt only).
                example: 51.0
              units_in_scope_br:
                type: integer
                nullable: true
                description: Σ brf_num_units over the kommun's distinct BRFs (cooperative stock in scope).
                example: 4800
              pct_for_sale_br:
                type: number
                nullable: true
                description: Share of that stock currently listed (listing_count_br / units_in_scope_br × 100).
                example: 7.9
              city_pct_for_sale_br:
                type: number
                nullable: true
                description: >
                  COPIED DOWN from the parent city — the city's pct_for_sale_br, so a
                  kommun row shows whether it is more/less on-market than its city
                  (compare pct_for_sale_br vs this). city_units_in_scope_br is alongside.
                example: 6.9
              city_turnover_br_agg_5y:
                type: number
                nullable: true
                description: >
                  COPIED DOWN from the parent city — the city's 5-year cumulative BR
                  turnover, so a kommun compares its own `turnover_br_agg_5y` to its
                  city's. The full city sold-history SUMMARY rides along as
                  `city_{sold_kr_per_m2,sold_fee_per_m2,turnover_br}_*` (the per-year
                  history stays on GET /cities, not copied down).
                example: 6.9
              avg_school_socio_index:
                type: number
                nullable: true
                description: >
                  Pooled mean school socio-economic index over the kommun's listings
                  (median_school_socio_index alongside). city_avg_school_socio_index is
                  the copied-down city value for a kommun-vs-city school comparison.
                example: 101.0
              price_stats:
                type: array
                description: >
                  Average and median sale price per m² (kr/m²) over completed
                  sales, one entry per (year, object_type) cell, ordered newest
                  year first then by object type. Precomputed at import. May be
                  empty if the kommun has no recorded sales.
                items:
                  type: object
                  required:
                    - year
                    - object_type
                    - avg_kr_per_m2
                    - median_kr_per_m2
                    - sample_count
                  properties:
                    year:
                      type: integer
                      description: Calendar year of the sales in this cell.
                      example: 2026
                    object_type:
                      type: string
                      description: Property type the stats are computed over.
                      example: bostadsrätt
                    avg_kr_per_m2:
                      type: integer
                      description: Mean sale price per m² (kr/m²) for this year and object type.
                      example: 41000
                    median_kr_per_m2:
                      type: integer
                      description: Median sale price per m² (kr/m²) for this year and object type.
                      example: 40600
                    sample_count:
                      type: integer
                      description: Number of completed sales behind this cell.
                      example: 120
        count:
          type: integer
          description: Number of distinct kommuns returned.
          example: 1

    AreasList:
      type: object
      required:
        - areas
        - count
        - filters
      properties:
        areas:
          type: array
          items:
            type: object
            # Per-type stats use a <type> suffix (br / villa / radhus / fritids);
            # the sample below is representative, full set in src/db/schema.sql.
            additionalProperties: true
            required:
              - kommun
              - area_name
              - listing_count
            properties:
              kommun:
                type: string
                description: The kommun the område belongs to.
                example: Tyresö
              area_name:
                type: string
                description: >
                  Område name; the exact value the `omrade` filter accepts.
                example: Trollbäcken
              listing_count:
                type: integer
                description: Total advertisements currently in this område (all boende types).
                example: 12
              city:
                type: string
                nullable: true
                description: The city this område's kommun belongs to (copied down).
                example: Stockholm
              listing_count_br:
                type: integer
                description: Sample size for the bostadsrätt stats (one per type).
                example: 9
              median_kr_per_m2_br:
                type: integer
                nullable: true
                description: >
                  Aggregated-up median asking price per m² for bostadsrätter over this
                  område's current advertisements — the neighbourhood benchmark (per
                  type: _br / _villa / _radhus / _fritids).
                example: 40500
              median_fee_per_m2_br:
                type: number
                nullable: true
                description: Median avgift per m²/month (bostadsrätt only).
                example: 47.0
              units_in_scope_br:
                type: integer
                nullable: true
                description: Σ brf_num_units over the område's distinct BRFs (cooperative stock in scope).
                example: 140
              pct_for_sale_br:
                type: number
                nullable: true
                description: Share of that stock currently listed (listing_count_br / units_in_scope_br × 100).
                example: 6.4
              turnover_br_2026:
                type: number
                nullable: true
                description: >
                  Sold-history (self): share of the område's BR stock sold in 2026
                  (per year `turnover_br_2021…2026`, + `turnover_br_agg_3y/5y`), plus
                  the `num_sales_br_*` / `sold_kr_per_m2_*` / `sold_fee_per_m2_*` block
                  (same shape as GET /cities). An område additionally carries its
                  ancestors' summaries copied down: `kommun_*` and `city_*`
                  (`kommun_turnover_br_agg_5y`, `city_sold_kr_per_m2_trend_5y`, …).
                example: 3.0
        count:
          type: integer
          description: Number of (kommun, område) rows returned.
          example: 10
        filters:
          type: object
          description: Echo of the filters that were applied.
          properties:
            kommun:
              type: string
              nullable: true
            name_search:
              type: string
              nullable: true

    AdvertisementsList:
      type: object
      required:
        - advertisements
        - count
        - filters
      properties:
        advertisements:
          type: array
          items:
            $ref: "#/components/schemas/Advertisement"
        count:
          type: integer
          description: Number of rows returned (at most 10).
          example: 10
        filters:
          type: object
          description: Echo of the filters and sort that were applied.
          properties:
            property_type:
              type: string
              nullable: true
            kommun:
              type: string
              nullable: true
            omrade:
              type: string
              nullable: true
            min_rooms:
              type: number
              nullable: true
            sort:
              type: string
              example: price_per_sqm_asc
            min_price:
              type: integer
              nullable: true
            max_price:
              type: integer
              nullable: true
            max_kr_per_m2:
              type: integer
              nullable: true
            min_area_m2:
              type: number
              nullable: true
            max_area_m2:
              type: number
              nullable: true
            min_construction_year:
              type: integer
              nullable: true
            max_construction_year:
              type: integer
              nullable: true
            max_fee_per_sqm:
              type: number
              nullable: true
            max_monthly_fee:
              type: integer
              nullable: true
            brf_org_number:
              type: string
              nullable: true
              description: Normalised to the stored `NNNNNN-NNNN` form.
              example: "769625-3744"
            min_brf_units:
              type: integer
              nullable: true
            max_brf_loan_per_m2:
              type: integer
              nullable: true
            min_brf_trend:
              type: integer
              nullable: true
            max_brf_fee_trend:
              type: number
              nullable: true
            min_brf_price_trend_5y:
              type: integer
              nullable: true
            min_brf_price_forecast:
              type: integer
              nullable: true
            max_brf_fee_trend_5y:
              type: number
              nullable: true
            max_brf_fee_forecast:
              type: number
              nullable: true
            min_brf_pct_for_sale:
              type: number
              nullable: true
            max_brf_pct_for_sale:
              type: number
              nullable: true
            min_school_index:
              type: number
              nullable: true
            min_school_index_1:
              type: number
              nullable: true
            min_school_index_3:
              type: number
              nullable: true
            near_lat:
              type: number
              nullable: true
            near_lng:
              type: number
              nullable: true
            radius_m:
              type: integer
              nullable: true
            limit:
              type: integer
              example: 10

    Advertisement:
      type: object
      description: >
        A property listing, fully denormalized — one flat row, no nested objects
        except `location`. Fields fall into three groups:

        • Listing core — listing_id, listed_date, asking_price_kr, property_type,
        street_name, street_number, apartment_number, rooms, living_area_m2,
        kr_per_m2, monthly_fee_kr (the BRF avgift in kr/month; NULL for listings
        with no fee), construction_year (the building's construction year),
        broker_agency, description, attributes (JSONB), photo_urls (ordered array
        of listing photos, primary first; each {url, primaryLabel, alt} so floor
        plans and maps are distinguishable from photos), source_url, kommun,
        location {lat, lng}.

        • BRF block (recovered by matching the listing address to the BRF
        residences export; NULL for non-coop listings or unmatched addresses) —
        brf_booli_id, brf_name, brf_org_number, brf_construction_year,
        brf_num_units, brf_num_rental_units, brf_total_living_area_m2,
        brf_plot_ownership, brf_is_genuine, brf_total_loan_kr,
        brf_annual_report_year, brf_has_valid_annual_report, brf_economy (JSONB).

        • Nearest-5 schools — school_1_* (closest) … school_5_*, each with:
        _skolenhetskod, _name, _type, _distance_m, _socio_index_2023 /
        _2024 / _2025 / _2026, _ineligible_pct_latest, _ineligible_pct_prev.
        Cross-school rollups are precomputed as flat columns at import time and
        ride along on every row, for three nearest-school radii (1 = closest, 3,
        5): a current latest-year average (`avg_school_socio_index_1` /
        `_3` / `avg_school_socio_index`) and a three-year-ahead projection of
        each (`avg_school_socio_index_1_forecast` / `_3_forecast` /
        `avg_school_socio_index_forecast`), fitted by least squares to each
        school's per-year history.

        • Geo hierarchy block (copied-down benchmarks; see docs/hierarchical-stats.md)
        — `city` (the level above kommun) plus this listing's ancestor aggregates
        carried onto the row so it is self-contained: `area_avg_kr_per_m2` /
        `area_median_kr_per_m2`, `kommun_avg_kr_per_m2` / `kommun_median_kr_per_m2`,
        `city_avg_kr_per_m2` / `city_median_kr_per_m2` — each the avg/median asking
        price per m² over listings of the SAME boende type (this listing's
        object_type) at that ancestor level. Compare a listing's own `kr_per_m2`
        against these to position it within its område, kommun, and city — like for
        like — without a second query.

        The properties below are a representative sample; the authoritative full
        column list is src/db/schema.sql. additionalProperties is true so new
        flat columns appear without a spec change.
      additionalProperties: true
      properties:
        listing_id:
          type: string
          example: "4123456"
        listed_date:
          type: string
          format: date
          nullable: true
          example: "2026-05-30"
        asking_price_kr:
          type: integer
          nullable: true
          example: 3895000
        property_type:
          type: string
          example: bostadsrätt
        street_name:
          type: string
          example: Gusthemsvägen
        rooms:
          type: number
          example: 3.0
        living_area_m2:
          type: number
          example: 72.0
        kr_per_m2:
          type: integer
          nullable: true
          example: 54097
        monthly_fee_kr:
          type: integer
          nullable: true
          description: >
            BRF monthly fee (avgift) in kr; NULL when the listing has no fee. The
            value the `fee_*` sort and `max_monthly_fee` filter operate on.
          example: 4687
        monthly_fee_per_m2:
          type: number
          nullable: true
          description: >
            Avgift per m² (kr/m²/month), derived at import from monthly_fee_kr /
            living_area_m2. The value the `fee_per_sqm_*` sort and `max_fee_per_sqm`
            filter operate on. NULL when the fee or area is missing.
          example: 66.7
        construction_year:
          type: integer
          nullable: true
          description: >
            Year the building was constructed (from the listing detail page).
            Building age = current year − this. The value the
            `construction_year_*` sort and min/max_construction_year filters use.
          example: 1992
        photo_urls:
          type: array
          nullable: true
          description: >
            Ordered listing photos (Booli CDN, webp), primary image first. The
            full gallery from the listing's detail page — not capped. Each item
            is an object carrying the photo's URL plus its category. NULL when the
            listing has no photos.
          items:
            type: object
            properties:
              url:
                type: string
                format: uri
                description: Booli CDN URL (1440px wide, webp).
              primaryLabel:
                type: string
                nullable: true
                description: >
                  Booli's category for the image — e.g. "floorplan" (planritning),
                  "property_map", "exterior", "interior", "kitchen/dining_room",
                  "bathroom/laundry", "balcony/view". NULL when Booli left the
                  image uncategorized.
                example: floorplan
              alt:
                type: string
                nullable: true
                description: Swedish alt text Booli provides for the image.
                example: Planlösning
          example:
            - url: https://bcdn.se/images/cache/54230613_1440x0.webp
              primaryLabel: exterior
              alt: Exteriörbild
            - url: https://bcdn.se/images/cache/54244810_1440x0.webp
              primaryLabel: floorplan
              alt: Planlösning
        kommun:
          type: string
          example: Tyresö
        area_name:
          type: string
          nullable: true
          description: >
            Sub-kommun område (neighborhood / stadsdel, Booli descriptiveAreaName).
            The value the `omrade` filter operates on. NULL when Booli supplies no
            område for the listing.
          example: Trollbäcken
        location:
          type: object
          nullable: true
          properties:
            lat:
              type: number
              example: 59.237
            lng:
              type: number
              example: 18.301
        brf_name:
          type: string
          nullable: true
          example: Brf Sjötungan
        brf_num_units:
          type: integer
          nullable: true
          description: Total number of apartments in the cooperative.
          example: 120
        brf_kr_per_m2_trend:
          type: integer
          nullable: true
          description: >
            The BRF's price/m² trend in kr per year, derived at import from the
            förening's own completed sales (least-squares slope over sold date).
            Negative when prices are declining. NULL with fewer than two priced
            sales. The value the `brf_trend_*` sort and `min_brf_trend` filter
            operate on.
          example: 1850
        brf_kr_per_m2_2026:
          type: integer
          nullable: true
          description: >
            The BRF's average kr/m² for 2026 (the current year) from its own
            completed sales — the latest point of the per-year history
            `brf_kr_per_m2_2021 … brf_kr_per_m2_2026` (each derived at import; NULL
            for a year with no priced sale). The value the `brf_price_*` sort
            operates on.
          example: 58200
        brf_kr_per_m2_trend_3y:
          type: integer
          nullable: true
          description: >
            The BRF's price/m² trend in kr per year, fit by least-squares over only
            the **last 3 years** of the per-year average series (vs the all-history
            `brf_kr_per_m2_trend`). NULL with <2 priced years in the window.
          example: 2100
        brf_kr_per_m2_trend_5y:
          type: integer
          nullable: true
          description: >
            As `brf_kr_per_m2_trend_3y` but fit over the **last 5 years**. The value
            the `brf_price_trend_5y_*` sort and `min_brf_price_trend_5y` filter
            operate on.
          example: 1950
        brf_kr_per_m2_forecast:
          type: integer
          nullable: true
          description: >
            The BRF's price/m² projected **3 years past the latest year** (i.e. 2029),
            extrapolating the 5-year least-squares fit (intercept + slope × target).
            NULL with <2 priced years in the 5-year window. The value the
            `brf_price_forecast_*` sort and `min_brf_price_forecast` filter operate on.
          example: 64000
        brf_loan_per_m2:
          type: number
          nullable: true
          description: >
            The BRF's loan per m² (kr/m²), derived at import from brf_total_loan_kr
            / brf_total_living_area_m2 (latest annual report). Only the current
            figure is available — Booli exposes no loan history, so there is no
            per-year series or trend. Lower means a less-indebted förening. The
            value the `brf_loan_*` sort and `max_brf_loan_per_m2` filter operate on.
          example: 4582.2
        brf_fee_per_m2_trend:
          type: number
          nullable: true
          description: >
            The BRF's avgift (monthly fee) per m² trend in kr per year, derived at
            import from the förening's own completed bostadsrätt sales (least-squares
            slope of monthly_fee_kr / living_area_m2 over sold date). Negative when
            fees are declining. NULL with fewer than two fee-bearing sales. The value
            the `brf_fee_trend_*` sort and `max_brf_fee_trend` filter operate on.
          example: 4.5
        brf_fee_per_m2_2026:
          type: number
          nullable: true
          description: >
            The BRF's average avgift per m² (kr/m²/month) for 2026 (the current year)
            from its own completed sales — the latest point of the 15-year per-year
            history `brf_fee_per_m2_2012 … brf_fee_per_m2_2026` (each derived at
            import; NULL for a year with no fee-bearing sale). The value the
            `brf_fee_*` sort operates on.
          example: 62.5
        brf_fee_per_m2_trend_5y:
          type: number
          nullable: true
          description: >
            The BRF's avgift/m² trend in kr per year, fit by least-squares over only
            the **last 5 years** of the per-year average series (vs the all-history
            `brf_fee_per_m2_trend`). Negative when fees are declining. NULL with <2
            fee-bearing years in the window. The value the `brf_fee_trend_5y_*` sort
            and `max_brf_fee_trend_5y` filter operate on.
          example: 3.2
        brf_fee_per_m2_trend_15y:
          type: number
          nullable: true
          description: >
            As `brf_fee_per_m2_trend_5y` but fit over the **last 15 years** — the
            long-run avgift trajectory. NULL with <2 fee-bearing years.
          example: 2.6
        brf_fee_per_m2_forecast:
          type: number
          nullable: true
          description: >
            The BRF's avgift/m² (kr/m²/month) projected **3 years past the latest
            year** (i.e. 2029), extrapolating the 5-year least-squares fit. NULL with
            <2 fee-bearing years in the 5-year window. The value the
            `brf_fee_forecast_*` sort and `max_brf_fee_forecast` filter operate on.
          example: 71.5
        brf_pct_for_sale:
          type: number
          nullable: true
          description: >
            Share of the BRF currently on the market, in percent: the count of
            this förening's advertisements divided by `brf_num_units` (the total
            number of apartments), derived at import and identical for every
            listing of the same BRF. A high value flags unusually heavy turnover;
            a low value a stable cooperative. NULL when `brf_num_units` is
            missing or zero. The value the `brf_pct_for_sale_*` sort and the
            `min_brf_pct_for_sale` / `max_brf_pct_for_sale` filters operate on.
          example: 2.6
        brf_num_sales_2026:
          type: integer
          nullable: true
          description: >
            BRF sold-history (self): number of the förening's completed sales in
            2026, from its own sales. One per year `brf_num_sales_2021…2026`;
            NULL for a BRF never seen in the staged sales, 0 for an in-scope year
            with no sale.
          example: 3
        brf_turnover_2026:
          type: number
          nullable: true
          description: >
            Share of the BRF's apartments sold in 2026 (`brf_num_sales_2026 /
            brf_num_units × 100`). One per year `brf_turnover_2021…2026`, plus the
            cumulative `brf_turnover_agg_3y` / `brf_turnover_agg_5y` (sales summed
            over the window ÷ units × 100) as the robust comparison level.
          example: 3.0
        kommun_turnover_br_agg_5y:
          type: number
          nullable: true
          description: >
            COPIED DOWN from the kommun — the kommun's 5-year cumulative BR turnover,
            so a listing can be compared to its kommun's liquidity in one row. Every
            ancestor's sold-history SUMMARY rides along this way:
            `{area,kommun,city}_{sold_kr_per_m2,sold_fee_per_m2,turnover_br}_*`
            (last-year + 3y/5y trend/agg + forecast). The per-year history is NOT
            copied down — it lives on the område/kommun/city rows (GET /areas etc.).
          example: 6.0
        school_1_name:
          type: string
          nullable: true
          example: Kumla skola
        school_1_distance_m:
          type: integer
          nullable: true
          description: Metres from the property to the nearest school.
          example: 420
        school_1_socio_index_2026:
          type: number
          nullable: true
          description: Latest-year socio-economic index of the nearest school.
          example: 92.0
        avg_school_socio_index_1:
          type: number
          nullable: true
          description: >
            The closest school's latest-year socio-economic index. The value the
            `school_index_1_*` sort and `min_school_index_1` filter operate on.
          example: 92.0
        avg_school_socio_index_3:
          type: number
          nullable: true
          description: >
            Average latest-year socio-economic index across the 3 nearest schools
            (a tighter radius). The value the `school_index_3_*` sort and
            `min_school_index_3` filter operate on.
          example: 89.1
        avg_school_socio_index:
          type: number
          nullable: true
          description: >
            Average latest-year socio-economic index across the (up to five)
            nearest schools, ignoring those whose index is suppressed. The value
            the `school_index_*` sort and `min_school_index` filter operate on.
            Source: Skolverket's *Index på skolenhetsnivå* (socioekonomiskt
            index), the dataset underlying the state grant *Statsbidrag för
            stärkt kunskapsutveckling* (tidigare *Statsbidrag för likvärdig
            skola*). Per Skolverket the index models students' preconditions from
            socioeconomic factors that affect the probability that a student at
            the school becomes eligible for a national programme in
            upper-secondary school; a higher index corresponds to a higher
            modelled share of students not expected to become eligible.
            Definition and source:
            https://www.skolverket.se/styrning-och-ansvar/statsbidrag/hitta-statsbidrag/statsbidrag-for-starkt-kunskapsutveckling-2026
          example: 88.4
        avg_school_socio_index_1_forecast:
          type: number
          nullable: true
          description: >
            Three-year-ahead least-squares projection of the closest school's
            index. Sort-only via `school_forecast_1_*`. NULL without enough history.
          example: 93.0
        avg_school_socio_index_3_forecast:
          type: number
          nullable: true
          description: >
            Three-year-ahead projection of `avg_school_socio_index_3`. Sort-only
            via `school_forecast_3_*`. NULL without enough history.
          example: 90.0
        avg_school_socio_index_forecast:
          type: number
          nullable: true
          description: >
            Three-year-ahead projection of `avg_school_socio_index`. For each of
            the nearest schools a least-squares line is fitted to its available
            per-year socio-economic index (2023–2026) and extrapolated; those
            per-school projections are averaged, ignoring schools with fewer than
            two years of data. Sort-only via `school_forecast_*`. NULL when no
            nearby school has enough history to establish a trend.
          example: 91.2

    BrfsList:
      type: object
      required:
        - brfs
        - count
        - filters
      properties:
        brfs:
          type: array
          items:
            $ref: "#/components/schemas/Brf"
        count:
          type: integer
          description: Number of rows returned (at most 10).
          example: 10
        filters:
          type: object
          description: Echo of the filters and sort that were applied.
          properties:
            brf_name_search:
              type: string
              nullable: true
            kommun:
              type: string
              nullable: true
            omrade:
              type: string
              nullable: true
            sort:
              type: string
              example: pct_for_sale_desc
            min_brf_units:
              type: integer
              nullable: true
            min_construction_year:
              type: integer
              nullable: true
            max_construction_year:
              type: integer
              nullable: true
            max_brf_loan_per_m2:
              type: integer
              nullable: true
            min_brf_price_trend_5y:
              type: integer
              nullable: true
            min_brf_price_forecast:
              type: integer
              nullable: true
            max_brf_fee_trend_5y:
              type: number
              nullable: true
            max_brf_fee_forecast:
              type: number
              nullable: true
            min_brf_pct_for_sale:
              type: number
              nullable: true
            max_brf_pct_for_sale:
              type: number
              nullable: true
            min_active_listings:
              type: integer
              nullable: true
            limit:
              type: integer
              example: 10

    Brf:
      type: object
      description: >
        One housing cooperative — a flat row collapsed from the denormalized
        brf_* columns on `advertisements` (identical for every listing of the
        same förening) plus the active-listing aggregates derived at import.
        Fields fall into four groups:


        • Identity / physical — brf_org_number (the key; pass it to
        `/advertisements?brf_org_number=`), brf_booli_id, brf_name, kommun,
        brf_construction_year, brf_num_units, brf_num_rental_units,
        brf_total_living_area_m2, brf_plot_ownership, brf_is_genuine,
        brf_annual_report_year, brf_has_valid_annual_report, brf_economy (JSONB).


        • Financial — brf_total_loan_kr, brf_loan_per_m2.


        • Price & fee dynamics — the per-year history series
        (brf_kr_per_m2_2021…2026, brf_fee_per_m2_2012…2026), their trends
        (brf_kr_per_m2_trend[_3y/_5y], brf_fee_per_m2_trend[_5y/_15y]) and
        three-year-ahead forecasts (brf_kr_per_m2_forecast,
        brf_fee_per_m2_forecast). Same semantics as the matching brf_* fields on
        the Advertisement schema.


        • Market activity — brf_pct_for_sale (share of the BRF on the market),
        active_listing_count and active_min/max/avg_kr_per_m2 over the förening's
        current advertisements.


        additionalProperties is true so new flat columns appear without a spec
        change; the authoritative full column list is the `brfs` table in
        src/db/schema.sql.
      additionalProperties: true
      properties:
        brf_org_number:
          type: string
          description: Swedish org.nr (`NNNNNN-NNNN`); the key for `/advertisements?brf_org_number=`.
          example: "769625-3744"
        brf_name:
          type: string
          nullable: true
          example: Brf Sjötungan
        kommun:
          type: string
          nullable: true
          example: Tyresö
        area_name:
          type: string
          nullable: true
          description: >
            Sub-kommun område (neighborhood / stadsdel), copied from the BRF's
            advertisements. The value the `omrade` filter operates on.
          example: Trollbäcken
        brf_num_units:
          type: integer
          nullable: true
          description: Total number of apartments in the cooperative.
          example: 120
        brf_construction_year:
          type: integer
          nullable: true
          example: 1992
        brf_loan_per_m2:
          type: number
          nullable: true
          description: The BRF's loan per m² (kr/m²); lower means a less-indebted förening.
          example: 4582.2
        brf_kr_per_m2_2026:
          type: integer
          nullable: true
          description: The BRF's current-year (latest) average kr/m². The `price_*` sort reads this.
          example: 58200
        brf_kr_per_m2_trend_5y:
          type: integer
          nullable: true
          description: Price/m² trend (kr per year) over the last 5 years. May be negative.
          example: 1950
        brf_kr_per_m2_forecast:
          type: integer
          nullable: true
          description: Price/m² projected 3 years past the latest year.
          example: 64000
        brf_fee_per_m2_2026:
          type: number
          nullable: true
          description: The BRF's current-year (latest) average avgift per m² (kr/m²/month).
          example: 62.5
        brf_fee_per_m2_forecast:
          type: number
          nullable: true
          description: Avgift/m² projected 3 years past the latest year.
          example: 71.5
        brf_pct_for_sale:
          type: number
          nullable: true
          description: >
            Share of the BRF currently on the market, in percent
            (active_listing_count / brf_num_units × 100). NULL when brf_num_units
            is missing or zero.
          example: 2.6
        brf_num_sales_2026:
          type: integer
          nullable: true
          description: >
            Sold-history (self): the förening's completed-sale COUNT in 2026 (one
            per year `brf_num_sales_2021…2026`).
          example: 3
        brf_turnover_2026:
          type: number
          nullable: true
          description: >
            Share of the BRF's apartments sold in 2026 (per year
            `brf_turnover_2021…2026`), plus `brf_turnover_agg_3y` /
            `brf_turnover_agg_5y` (cumulative share sold over the window). The
            price/fee sold-history is the `brf_kr_per_m2_*` / `brf_fee_per_m2_*`
            series above; ancestor summaries are carried as
            `{area,kommun,city}_{sold_kr_per_m2,sold_fee_per_m2,turnover_br}_*`.
          example: 3.0
        active_listing_count:
          type: integer
          description: Number of this BRF's current advertisements.
          example: 3
        active_min_kr_per_m2:
          type: integer
          nullable: true
          description: Lowest kr/m² among the BRF's current advertisements.
          example: 51000
        active_max_kr_per_m2:
          type: integer
          nullable: true
          description: Highest kr/m² among the BRF's current advertisements.
          example: 57000
        active_avg_kr_per_m2:
          type: integer
          nullable: true
          description: Average kr/m² across the BRF's current advertisements.
          example: 54000

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: year must be an integer
